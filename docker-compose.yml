services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - SUPABASE_SERVICE_ROLE_KEY
      - NEXT_PUBLIC_SITE_URL=http://localhost:3001
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
